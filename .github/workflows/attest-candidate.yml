# SPDX-License-Identifier: SSPL-1.0
name: Attest release candidate

on: workflow_dispatch

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out Server
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {path: nostos-server}
      - name: Check out Core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {repository: nostosdb/nostos-core, path: nostos-core}
      - name: Build locked candidate
        working-directory: nostos-server
        run: cargo build --release --locked
      - name: Package candidate and checksum
        shell: pwsh
        run: |
          $suffix = if ("${{ runner.os }}" -eq "Windows") { ".exe" } else { "" }
          $name = "nostos-server-${{ runner.os }}-${{ runner.arch }}"
          New-Item -ItemType Directory -Force -Path "nostos-server/dist/$name" | Out-Null
          Copy-Item "nostos-server/target/release/nostos-server$suffix" "nostos-server/dist/$name/"
          Copy-Item "nostos-server/LICENSE", "nostos-server/NOTICE", "nostos-server/README.md" "nostos-server/dist/$name/"
          Compress-Archive -Path "nostos-server/dist/$name/*" -DestinationPath "nostos-server/dist/$name.zip"
          $hash = (Get-FileHash "nostos-server/dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Set-Content -NoNewline "nostos-server/dist/$name.zip.sha256"
      - name: Attest candidate provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: nostos-server/dist/*.zip
      - name: Upload candidate without publishing a release
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nostos-server-${{ runner.os }}-${{ runner.arch }}
          path: |
            nostos-server/dist/*.zip
            nostos-server/dist/*.sha256
          if-no-files-found: error
